apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "splunk-enterprise-stack.operator.fullname" . }}-proxy-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "splunk-enterprise-stack.operator.fullname" . }}-proxy-role
subjects:
- kind: ServiceAccount
  name: {{ include "splunk-enterprise-stack.operator.fullname" . }}-controller-manager
  namespace: {{ include "splunk-enterprise-stack.namespace" . }}
