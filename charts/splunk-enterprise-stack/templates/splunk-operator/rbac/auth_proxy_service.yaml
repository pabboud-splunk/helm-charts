apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "splunk-enterprise-stack.labels" . | nindent 4 }}
  name: {{ include "splunk-enterprise-stack.operator.fullname" . }}-controller-manager-metrics-service
  namespace: {{ include "splunk-enterprise-stack.namespace" . }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    {{- include "splunk-enterprise-stack.labels" . | nindent 4 }}
