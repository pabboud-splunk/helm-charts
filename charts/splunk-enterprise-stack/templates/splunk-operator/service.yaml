apiVersion: v1
kind: Service
metadata:
  name: {{ include "splunk-enterprise-stack.operator.fullname" . }}-controller-manager-service
  labels:
    {{- include "splunk-enterprise-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.splunkOperator.service.type }}
  ports:
    - port: {{ .Values.splunkOperator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "splunk-enterprise-stack.selectorLabels" . | nindent 4 }}
